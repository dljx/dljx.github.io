/* ───── Particle Field ───── */
const ParticleField = ({ accent = '#10b981' }) => {
  const canvasRef = useRef(null);
  const mouseRef = useRef({ x: -1000, y: -1000, active: false });
  useEffect(() => {
    const canvas = canvasRef.current;
    if (!canvas) return;
    const ctx = canvas.getContext('2d');
    let W = 0, H = 0, raf = 0, nodes = [];
    const DPR = Math.min(window.devicePixelRatio || 1, 2);
    const hexToRgba = (hex, a) => { const h = hex.replace('#',''); return `rgba(${parseInt(h.substring(0,2),16)},${parseInt(h.substring(2,4),16)},${parseInt(h.substring(4,6),16)},${a})`; };
    const resize = () => {
      const rect = canvas.getBoundingClientRect(); W = rect.width; H = rect.height;
      canvas.width = W * DPR; canvas.height = H * DPR; ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
      nodes = Array.from({ length: Math.floor((W * H) / 16000) }, () => ({ x: Math.random() * W, y: Math.random() * H, vx: (Math.random() - 0.5) * 0.25, vy: (Math.random() - 0.5) * 0.25, r: Math.random() * 1.2 + 0.4 }));
    };
    const onMove = (e) => { const rect = canvas.getBoundingClientRect(); mouseRef.current = { x: e.clientX - rect.left, y: e.clientY - rect.top, active: true }; };
    const onLeave = () => { mouseRef.current.active = false; };
    const tick = () => {
      ctx.clearRect(0, 0, W, H); const m = mouseRef.current;
      if (m.active) { const g = ctx.createRadialGradient(m.x, m.y, 0, m.x, m.y, 180); g.addColorStop(0, `${accent}22`); g.addColorStop(1, 'transparent'); ctx.fillStyle = g; ctx.fillRect(0, 0, W, H); }
      for (let n of nodes) { n.x += n.vx; n.y += n.vy; if (n.x < 0 || n.x > W) n.vx *= -1; if (n.y < 0 || n.y > H) n.vy *= -1;
        if (m.active) { const dx = n.x - m.x, dy = n.y - m.y, d2 = dx*dx + dy*dy; if (d2 < 140*140) { const d = Math.sqrt(d2) || 1; const force = (140 - d) / 140 * 0.6; n.x += (dx/d) * force; n.y += (dy/d) * force; } }
        ctx.beginPath(); ctx.arc(n.x, n.y, n.r, 0, Math.PI * 2); ctx.fillStyle = 'rgba(168,177,191,0.5)'; ctx.fill();
      }
      for (let i = 0; i < nodes.length; i++) for (let j = i + 1; j < nodes.length; j++) {
        const a = nodes[i], b = nodes[j], dx = a.x - b.x, dy = a.y - b.y, d2 = dx*dx + dy*dy;
        if (d2 < 120*120) { ctx.strokeStyle = `rgba(168,177,191,${(1 - Math.sqrt(d2)/120) * 0.18})`; ctx.lineWidth = 0.6; ctx.beginPath(); ctx.moveTo(a.x, a.y); ctx.lineTo(b.x, b.y); ctx.stroke(); }
        if (m.active) { const mx = (a.x+b.x)/2-m.x, my = (a.y+b.y)/2-m.y; if (mx*mx+my*my < 120*120 && d2 < 140*140) { ctx.strokeStyle = hexToRgba(accent, (1-Math.sqrt(mx*mx+my*my)/120)*0.35); ctx.lineWidth = 0.8; ctx.beginPath(); ctx.moveTo(a.x, a.y); ctx.lineTo(b.x, b.y); ctx.stroke(); } }
      }
      raf = requestAnimationFrame(tick);
    };
    resize(); window.addEventListener('resize', resize); window.addEventListener('mousemove', onMove); window.addEventListener('mouseleave', onLeave); raf = requestAnimationFrame(tick);
    return () => { cancelAnimationFrame(raf); window.removeEventListener('resize', resize); window.removeEventListener('mousemove', onMove); window.removeEventListener('mouseleave', onLeave); };
  }, [accent]);
  return <canvas ref={canvasRef} style={{ position: 'absolute', inset: 0, width: '100%', height: '100%' }} />;
};

/* ───── Terminal ───── */
const TERMINAL_LINES = [
  { p: '$ ', c: 'vertex deploy --model=gemini-2.5-flash --env=prod', t: 'cmd' },
  { t: 'log', c: '↳ bootstrapping vertex-ai pipeline ...' },
  { t: 'ok',  c: '  ✓ authenticated · cloud run services ready' },
  { t: 'ok',  c: '  ✓ pushed 7 agents to agentic-data-assistant' },
  { t: 'ok',  c: '  ✓ deployed extraction-pipeline (asia-se1, us-c1)' },
  { t: 'dim', c: '  ↳ running validation suite  (84 cases)' },
  { t: 'ok',  c: '  ✓ multi-pass extraction   3/3 passes clean' },
  { t: 'ok',  c: '  ✓ coaching latency  p99 41ms  ← target 60ms' },
  { t: 'ok',  c: '  ✓ compliance audit  6/6 agents  ← all pass' },
  { p: '$ ', c: '_', t: 'cursor' },
];

const Terminal = () => {
  const [shown, setShown] = useState(0);
  useEffect(() => {
    if (shown >= TERMINAL_LINES.length) return;
    const delay = shown === 0 ? 600 : 260 + Math.random() * 180;
    const t = setTimeout(() => setShown(s => s + 1), delay);
    return () => clearTimeout(t);
  }, [shown]);
  const color = (t) => ({ cmd: '#e7ecf3', log: '#a8b1bf', ok: '#34d399', dim: '#6b7280', cursor: '#34d399' })[t] || '#a8b1bf';
  return (
    <div className="glass" style={{ borderRadius: 14, overflow: 'hidden', boxShadow: '0 40px 100px -30px rgba(0,0,0,0.6)', fontFamily: "'JetBrains Mono', monospace", fontSize: 12.5, lineHeight: 1.9 }}>
      <div style={{ display: 'flex', alignItems: 'center', gap: 8, padding: '10px 14px', borderBottom: '1px solid var(--line)', background: 'rgba(0,0,0,0.3)' }}>
        <span style={{ width: 10, height: 10, borderRadius: '50%', background: '#f87171' }}/>
        <span style={{ width: 10, height: 10, borderRadius: '50%', background: '#fbbf24' }}/>
        <span style={{ width: 10, height: 10, borderRadius: '50%', background: '#34d399' }}/>
        <span style={{ marginLeft: 10, color: 'var(--fg-2)', fontSize: 11 }}>~/projects · zsh</span>
        <span style={{ marginLeft: 'auto', display: 'inline-flex', alignItems: 'center', gap: 6 }}>

        {TERMINAL_LINES.slice(0, shown).map((l, i) => (

            {l.p && <span style={{ color: '#60a5fa' }}>{l.p}</span>}
            <span>{l.c}</span>
            {l.t === 'cursor' && <span style={{ animation: 'blink 1s steps(2) infinite' }}>▎</span>}
          </div>
        ))}
      </div>
    </div>
  );
};

        <div style={{ display: 'inline-flex', alignItems: 'center', gap: 10, padding: '6px 12px', borderRadius: 100, border: '1px solid var(--line-strong)', background: 'rgba(255,255,255,0.02)', marginBottom: 28 }}>
          <StatusDot color={accent} size={5}/>

          <span style={{ background: `linear-gradient(120deg, ${accent} 0%, #3b82f6 100%)`, WebkitBackgroundClip: 'text', WebkitTextFillColor: 'transparent', backgroundClip: 'text' }}>enterprise-scale</span><br/>
          AI&nbsp;systems.
        </h1>
        <p style={{ color: 'var(--fg-1)', fontSize: 18, lineHeight: 1.55, maxWidth: 540, margin: '0 0 36px', fontWeight: 400 }}>

          }}>view selected work <Icon name="arrow" size={14}/></a>

            display: 'inline-flex', alignItems: 'center', gap: 8, padding: '12px 18px', borderRadius: 10, fontSize: 13, fontWeight: 500,

/* ───── Shared Visual Header ───── */
const VisualHeader = ({ kicker, value, unit, secondary }) => (

/* ───── Project Visuals ───── */
const AgentPipelineVisual = () => {
  const nodes = [
    { id: 'parse', x: 10, y: 50, label: 'Parse' },
    { id: 'embed', x: 30, y: 25, label: 'Embed' },
    { id: 'plan',  x: 50, y: 50, label: 'Plan' },
    { id: 'exec',  x: 70, y: 25, label: 'Execute' },
    { id: 'synth', x: 90, y: 50, label: 'Synth' },
  ];
  const edges = [['parse','embed'],['parse','plan'],['embed','plan'],['plan','exec'],['exec','synth']];
  const get = (id) => nodes.find(n => n.id === id);
  return (
    <div style={{ height: '100%', display: 'flex', flexDirection: 'column' }}>
      <VisualHeader kicker="pipeline · 7 agents" value="5" unit="stages" secondary="rag" />
      <div style={{ flex: 1, minHeight: 0, position: 'relative', padding: '0 20px 16px' }}>
        <svg viewBox="0 0 100 100" preserveAspectRatio="none" style={{ position: 'absolute', inset: '0 20px 16px 20px', width: 'calc(100% - 40px)', height: 'calc(100% - 16px)', display: 'block', overflow: 'visible' }}>
          {edges.map(([a,b], i) => { const A = get(a), B = get(b); return (
            <g key={`${a}-${b}`}>
              <line x1={A.x} y1={A.y} x2={B.x} y2={B.y} stroke="rgba(255,255,255,0.1)" strokeWidth="0.3" vectorEffect="non-scaling-stroke"/>
              <circle r="0.9" fill={accent}><animateMotion dur={`${2.2+i*0.4}s`} repeatCount="indefinite" path={`M ${A.x} ${A.y} L ${B.x} ${B.y}`}/></circle>
            </g>
          ); })}
          {nodes.map(n => (<g key={n.id}><circle cx={n.x} cy={n.y} r="2.4" fill="#0b0f17" stroke="rgba(255,255,255,0.18)" strokeWidth="0.25" vectorEffect="non-scaling-stroke"/><circle cx={n.x} cy={n.y} r="1" fill={accent}/></g>))}
        </svg>
        <div style={{ position: 'absolute', inset: '0 20px 16px 20px', pointerEvents: 'none' }}>
          {nodes.map(n => (<div key={n.id} className="mono" style={{ position: 'absolute', left: `calc(${n.x}% - 40px)`, top: `calc(${n.y}% + 8px)`, width: 80, textAlign: 'center', fontSize: 10, color: 'var(--fg-1)', letterSpacing: 0.3 }}>{n.label}</div>))}
        </div>
      </div>
    </div>
  );
};

const ExtractionVisual = () => {
  const [data, setData] = useState(() => {
    const arr = []; let v = 91;
    for (let i = 0; i < 40; i++) { v += (Math.random() - 0.5) * 3; v = Math.max(84, Math.min(98, v)); arr.push(v); }
    return arr;
  });
  useEffect(() => {
    const id = setInterval(() => {
      setData(d => {
        const last = d[d.length-1];
        const jitter = (Math.random()-0.5)*2 + (Math.random()<0.03 ? 4 : 0);
        let next = last + jitter; next += (91 - next) * 0.08; next = Math.max(82, Math.min(99, next));
        return [...d.slice(1), next];
      });
    }, 600);
    return () => clearInterval(id);
  }, []);
  const max = 100, min = 80;
  const pts = data.map((v, i) => `${(i/(data.length-1))*100},${100 - ((v-min)/(max-min))*100}`).join(' ');
  return (

const Heatmap = () => {
  const weeks = 26;
  const cells = useMemo(() => {
    const arr = [];
    for (let w = 0; w < weeks; w++) {
      const week = [];
      for (let d = 0; d < 7; d++) {
        const base = (d === 0 || d === 6) ? 0.25 : 0.6;
        const r = Math.random();
        let v = 0;
        if (r < base * 0.25) v = 0; else if (r < base * 0.5) v = 1; else if (r < base * 0.8) v = 2; else if (r < base * 0.95) v = 3; else v = 4;
        week.push(v);
      }
      arr.push(week);
    }
    return arr;
  }, []);
  const color = (v) => v === 0 ? 'rgba(255,255,255,0.04)' : accent + Math.floor((0.2 + v * 0.2) * 255).toString(16).padStart(2, '0');
  return (
    <div style={{ display: 'flex', gap: 2, justifyContent: 'flex-start' }}>
      {cells.map((week, i) => (
        <div key={i} style={{ display: 'flex', flexDirection: 'column', gap: 2 }}>
          {week.map((v, j) => <span key={j} style={{ width: 10, height: 10, borderRadius: 2, background: color(v), border: '1px solid rgba(255,255,255,0.02)' }}/>)}
        </div>
      ))}
    </div>
  );
};

/* ───── Dock ───── */
const Dock = () => {
  const items = [
    { icon: 'home', label: 'home', target: 'home' },
    { icon: 'work', label: 'work', target: 'work' },
    { icon: 'cpu', label: 'stack', target: 'stack' },
    { icon: 'pulse', label: 'activity', target: 'metrics' },
    { icon: 'mail', label: 'contact', target: 'contact' },
  ];
  const [active, setActive] = useState('home');
  const [time, setTime] = useState('');

  useEffect(() => {
    const update = () => setTime(new Date().toLocaleTimeString('en-GB', { hour12: false }));
    update(); const t = setInterval(update, 1000);
    const obs = new IntersectionObserver((entries) => { entries.forEach(e => { if (e.isIntersecting) setActive(e.target.id); }); }, { rootMargin: '-40% 0px -55% 0px' });
    items.forEach(i => { const el = document.getElementById(i.target); if (el) obs.observe(el); });
    return () => { clearInterval(t); obs.disconnect(); };
  }, []);

  const scrollTo = (id) => { const el = document.getElementById(id); if (el) { window.scrollTo({ top: el.getBoundingClientRect().top + window.scrollY - 40, behavior: 'smooth' }); } };

  return (
    <nav style={{ position: 'fixed', left: '50%', transform: 'translateX(-50%)', bottom: 24, zIndex: 50, display: 'flex', alignItems: 'center', gap: 4, padding: '6px', borderRadius: 16 }} className="glass-strong">
      <div style={{ display: 'flex', alignItems: 'center', gap: 8, padding: '6px 12px 6px 10px', borderRight: '1px solid var(--line)' }}>
        <div style={{ width: 22, height: 22, borderRadius: 6, background: accent, display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: 12, fontWeight: 800, color: '#0a0a0a', letterSpacing: -0.5, boxShadow: `0 0 16px ${accent}66` }}>D</div>
        <span className="mono" style={{ fontSize: 11.5, color: 'var(--fg-0)', fontWeight: 600 }}>daryl.</span>
        <span className="mono" style={{ fontSize: 10, color: 'var(--fg-3)' }}>ai-eng</span>
      </div>
      {items.map(i => (
        <button key={i.target} onClick={() => scrollTo(i.target)} style={{
          position: 'relative', display: 'inline-flex', alignItems: 'center', gap: 8,
          padding: '8px 12px', borderRadius: 10, background: 'transparent', border: 'none', cursor: 'pointer',
          color: active === i.target ? 'var(--fg-0)' : 'var(--fg-1)', transition: 'color .2s',
        }}>
          {active === i.target && <span style={{ position: 'absolute', inset: 0, borderRadius: 10, background: 'rgba(255,255,255,0.05)', border: '1px solid var(--line-strong)' }}/>}
          <span style={{ position: 'relative', display: 'inline-flex' }}>
            <Icon name={i.icon} size={15}/>
            {active === i.target && <span style={{ position: 'absolute', bottom: -6, left: '50%', transform: 'translateX(-50%)', width: 4, height: 4, borderRadius: '50%', background: accent, boxShadow: `0 0 6px ${accent}` }}/>}
          </span>
          <span className="mono" style={{ position: 'relative', fontSize: 11.5, fontWeight: 500, letterSpacing: 0.3 }}>{i.label}</span>
        </button>
      ))}
      <div style={{ display: 'flex', alignItems: 'center', gap: 8, padding: '6px 12px', borderLeft: '1px solid var(--line)', marginLeft: 4 }}>
        <StatusDot color={accent} size={5}/>
        <span className="mono" style={{ fontSize: 11, color: 'var(--fg-1)', fontVariantNumeric: 'tabular-nums' }}>{time} UTC</span>
      </div>
    </nav>
  );
};

/* ───── App ───── */
const App = () => (
  <div style={{ position: 'relative', zIndex: 1 }}>
    <Dock />
    <div style={{ paddingBottom: 100 }}>
      <Hero />
      <ProofOfWork />
      <Stack />
      <LiveMetrics />
      <Contact />
    </div>
  </div>
);

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
  </script>
